# Layered onto compose.yml when royer.app's backend launches a preview.
# Local `docker compose up` ignores this file; the backend stacks it with -f.
#
# Two jobs:
#   1. Tag the static-file nginx as the entrypoint so the backend proxies to it.
#   2. Strip the host port binding so shared preview sessions don't collide.

services:
  web:
    ports: !override ["30100:80"]
    labels:
      royer.entrypoint: "true"
      royer.port: "80"
